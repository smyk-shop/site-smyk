<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>BlueWave Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Blue<span>Wave</span></div>
        <div class="search-bar">
            <input type="text" placeholder="Поиск товаров...">
        </div>
        <div class="nav-links">
            <a href="#">Каталог</a>
            <a href="#">Заказы</a>
            <div class="cart-icon">🛒 <span id="cart-count">0</span></div>
        </div>
    </nav>

    <header class="hero">
        <h1>Технологии в синих тонах</h1>
        <p>Лучшие предложения этой весны со скидкой до 40%</p>
        <button class="btn-main">Смотреть всё</button>
    </header>

    <main class="container">
        <section class="products" id="product-grid">
            <!-- Сюда скрипт добавит карточки -->
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
