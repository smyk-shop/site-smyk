<!DOCTYPE html>
<html lang="ru">

<script src="config.js"></script>

<script src="script.js"></script>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta charset="UTF-8">
    <title>Mogy Pozvolit</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Smyk<span>Shop</span></div>
        <div class="search-bar">
            <input type="text" placeholder="Поиск товаров...">
        </div>
        <div class="nav-links">
            <div class="cart-icon">🛒 <span id="cart-count">0</span></div>
        </div>
    </nav>

    <header class="hero">
        <h1>Smyk Shop</h1>
    </header>

    <main class="container">
        <section class="products" id="product-grid">
        </section>
    </main>

    <script src="script.js"></script>
<div id="cart-modal" class="modal">
   <div class="modal-content">
    <span class="close-modal">&times;</span>
    <h2>Оформление заказа</h2>
    
    <div id="cart-items-list"></div>
    <div class="cart-total">Итого: <span id="total-price">0</span> ₽</div>

    <hr>

   <div class="order-form">
    <input type="text" id="user-name" placeholder="Ваше Имя" required>
    <input type="tel" id="user-phone" placeholder="Номер телефона" required>
    <input type="text" id="user-address" placeholder="Адрес доставки" required>
    <input type="text" id="user-time" placeholder="Когда приехать? (например: 15 мая, 14:00)" required>
</div>

    <button class="btn-checkout" onclick="checkout()">Отправить заказ в Telegram</button>
</div>

</div>
<div id="toast-container"></div>

</body>
</html>
